{% extends "base.html" %}
{% block title %}上传头像 - 用户管理系统{% endblock %}
{% block content %}
<div class="card login-card">
    <h2>上传头像</h2>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post" action="/upload" enctype="multipart/form-data" class="upload-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="file">选择头像文件</label>
            <input type="file" id="file" name="file" class="file-input" accept="image/*">
        </div>
        <button type="submit" class="btn btn-primary">上传</button>
    </form>

    {% if uploaded_url %}
        <div class="upload-result">
            <h3>上传成功！</h3>
            <div class="preview">
                <img src="{{ uploaded_url }}" alt="头像预览" class="avatar-preview">
            </div>
            <p class="file-link">
                <strong>文件链接：</strong>
                <a href="{{ uploaded_url }}" target="_blank">{{ uploaded_url }}</a>
            </p>
        </div>
    {% endif %}
</div>
{% endblock %}
