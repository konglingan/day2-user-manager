<!-- 安全修复：已移除泄露账号的调试注释 -->
{% extends "base.html" %}
{% block title %}登录 - 用户管理系统{% endblock %}
{% block content %}
<div class="card login-card">
    <h2>用户登录</h2>

    {% if request.args.get('registered') == '1' %}
        <div class="success-msg">注册成功，请登录</div>
    {% endif %}

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" class="login-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="请输入用户名" maxlength="50" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码" maxlength="128" required>
        </div>
        <button type="submit" class="btn btn-primary">登录</button>
    </form>
    <p class="form-footer">还没有账号？<a href="/register">立即注册</a></p>
</div>
{% endblock %}
