{% extends "base.html" %}
{% block title %}XML 导入 - 用户管理系统{% endblock %}
{% block content %}
<div class="card xml-card">
    <h2>XML 数据导入</h2>
    <p>输入 XML 数据，系统将安全解析并提取其中的用户信息。</p>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post" action="/xml-import" class="xml-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="xml_data">XML 数据</label>
            <textarea id="xml_data" name="xml_data" class="xml-textarea" rows="15" placeholder="请输入 XML 数据"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">导入</button>
    </form>

    {% if result %}
        <div class="xml-result">
            <h3>解析结果</h3>
            <pre class="xml-output">{{ result }}</pre>
        </div>
    {% endif %}
</div>
{% endblock %}
