<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>帮助中心</title>
</head>
<body>
    <div class="help-center">
        <h2>帮助中心</h2>
        <div class="help-section">
            <h3>如何注册账号？</h3>
            <p>点击导航栏的"注册"按钮，填写用户名、密码、邮箱和手机号即可完成注册。</p>
        </div>
        <div class="help-section">
            <h3>如何上传头像？</h3>
            <p>登录后点击"上传头像"，选择符合条件的图片文件（支持 jpg、jpeg、png、gif、webp 格式），点击上传即可。</p>
        </div>
        <div class="help-section">
            <h3>如何进行充值？</h3>
            <p>登录后进入"个人中心"，在充值区域输入金额（必须为正数），点击充值按钮即可增加账户余额。</p>
        </div>
        <div class="help-section">
            <h3>如何搜索其他用户？</h3>
            <p>登录后，在首页的搜索框中输入用户名或邮箱关键词，即可搜索到匹配的用户信息。</p>
        </div>
        <div class="help-section">
            <h3>忘记密码了怎么办？</h3>
            <p>请联系管理员重置密码。管理员邮箱：admin@example.com</p>
        </div>
    </div>
</body>
</html>
